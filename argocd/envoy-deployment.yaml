apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: envoy
  template:
    metadata:
      labels:
        app: envoy
    spec:
      containers:
        - name: envoy
          image: envoyproxy/envoy:v1.30.0
          ports:
            - containerPort: 10000
              name: http
          volumeMounts:
            - name: static-config
              mountPath: /etc/envoy
            - name: dynamic-config
              mountPath: /etc/envoy/dynamic
      volumes:
        - name: static-config
          configMap:
            name: envoy-static-config
        - name: dynamic-config
          configMap:
            name: envoy-dynamic-config