apiVersion: apps/v1
kind: Deployment
metadata:
  name: profile-site
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: profile-site
  template:
    metadata:
      labels:
        app: profile-site
    spec:
      containers:
        - name: site
          # ここは実際にビルド・プッシュしたイメージ名に置き換えてください
          image: registry.uniproject.jp/homepage/site:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: site-service
  namespace: default
spec:
  selector:
    matchLabels:
      app: profile-site
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000